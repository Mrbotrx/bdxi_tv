name: KB BOT PRO ROARZONET

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python newtest.py
        env:
          BOT_NAME: ${{ secrets.BOT_NAME }}
          BASE_API: ${{ secrets.BASE_API }}

      - name: Debug output (optional but useful)
        run: |
          echo "Listing files after script run:"
          ls -la

      - name: Commit file safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Prevent crash if file doesn't exist
          if [ -f ROARZONET.m3u8 ]; then
            git add ROARZONET.m3u8

            # Only commit if there are changes
            git commit -m "auto update ROARZONET.m3u8" || echo "No changes to commit"

            git push
          else
            echo "ROARZONET.m3u8 not found — skipping commit"
          fi
