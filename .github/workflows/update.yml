name: KBprotv IPTV BOT

on:
  schedule:
    # প্রতি ৩৫ মিনিট পর পর স্বয়ংক্রিয়ভাবে রান হবে
    - cron: '*/35 * * * *'
  workflow_dispatch: # হাত দিয়ে ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytz

    - name: Run Bot Script
      env:
        # GitHub Secrets থেকে ব্যাকএন্ডে সোর্স লিংক পাস করা হচ্ছে
        KBPROTV: ${{ secrets.KBPROTV }}
      run: python bot.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add kbtvpro.m3u8
        
        # কোনো পরিবর্তন না থাকলে ফালতু বিল্ড লুপ এড়াতে কমিন্ট করবে না
        if git diff --staged --quiet; then
          echo "No changes detected."
        else
          git commit -m "Automated Playlist Update [Skip CI]"
          git push
        fi
