name: Auto Update IPTV Playlist

on:
  # প্রতি ৩০ মিনিট পর পর চালাবে
  schedule:
    - cron: '*/30 * * * *'
  # ম্যানুয়ালি চালানোর জন্য
  workflow_dispatch:

jobs:
  update:
    name: Build & Update Playlist
    runs-on: ubuntu-latest
    steps:
      # ১. কোড নিজে আনো
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # সিক্রেটের জন্য (যদি লাগে)

      # ২. Python ইনস্টল করো
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ৩. Dependencies ইনস্টল করো
      - name: Install dependencies
        run: pip install requests

      # ৪. স্ক্রিপ্ট চালাও
      - name: Generate Playlist
        run: python bot.py

      # ৫. (ঐচ্ছিক) আপডেটেড ম্যানুয়ালি দেখানোর জন্য
      - name: Upload updated kbtvpro.m3u8
        uses: actions/upload-artifact@v4
        with:
          name: kbtvpro.m3u8
          path: kbtvpro.m3u8
