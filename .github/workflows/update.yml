name: Auto Update IPTV Playlist

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    name: Build & Update Playlist

    runs-on: ubuntu-latest


    steps:

      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4


      # Python Setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip


      # Install Packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz


      # Run Bot
      - name: Generate Playlist
        env:
          KBPROTV: ${{ secrets.KBPROTV }}
          KBPROTV2: ${{ secrets.KBPROTV2 }}
          ABCD: ${{ secrets.ABCD }}
        run: |
          python bot.py


      # Check Output
      - name: Check Generated File
        run: |
          ls -lh
          echo "Playlist Preview:"
          head -20 kbtvpro.m3u8 || true


      # Commit Update
      - name: Commit and Push Playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add kbtvpro.m3u8

          git commit -m "Auto update IPTV playlist" || echo "No changes"

          git push
