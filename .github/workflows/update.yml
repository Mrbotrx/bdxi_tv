name: KBprotv IPTV BOT

on:
  schedule:
    - cron: "0,35 * * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository (FAST)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python (FAST CACHE)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies (FAST)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir requests pytz

      - name: Run Bot Script (FAST EXECUTION)
        env:
          KBPROTV: ${{ secrets.KBPROTV }}
          KBPROTV2: ${{ secrets.KBPROTV2 }}
        run: |
          python -u bot.py

      - name: Commit and Push (OPTIMIZED)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add kbtvpro.m3u8

          # ⚡ avoid unnecessary commits
          if git diff --cached --quiet; then
            echo "No changes detected - skipping push"
            exit 0
          fi

          git commit -m "Auto IPTV Update [FAST]"
          git push
