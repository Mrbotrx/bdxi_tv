name: BDXI AKASH by Kbbot

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp

      - name: Run IPTV playlist generator
        run: python Bdotttv.py
        env:
          LIVE_API: ${{ secrets.LIVE_API }}
          DETAIL_API: ${{ secrets.DETAIL_API }}

      - name: Commit and push updated playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force add the file (even if unchanged)
          git add -f akashdth.m3u
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes detected in akashdth.m3u"
            # Create empty commit to trigger update timestamp
            git commit --allow-empty -m "🔄 Trigger workflow update [skip ci]"
          else
            echo "Changes detected, committing updates..."
            git commit -m "🔄 Auto update IPTV playlist [skip ci]"
          fi
          
          # Push changes
          git push
          
      - name: Verify file exists
        run: |
          if [ -f "akashdth.m3u" ]; then
            echo "✅ akashdth.m3u exists"
            lines=$(wc -l < akashdth.m3u)
            echo "📄 File has $lines lines"
          else
            echo "❌ akashdth.m3u not found!"
            exit 1
          fi
