name: BDXI AKASH by Kbbot

on:
schedule:
- cron: '*/40 * * * *'
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      pip install aiohttp

  - name: Run BDXI AKASH
    run: |
      python Bdotttv.py

  - name: Commit Updated M3U
    run: |
      git config --global user.name "Kbbot"
      git config --global user.email "actions@github.com"

      git add akashdth.m3u

      git diff --staged --quiet || git commit -m "BDXI AKASH Auto Update"

      git push
