name: BDXI AKASH by Kbbot

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp

      - name: Run IPTV playlist generator
        run: python Bdotttv.py
        env:
          LIVE_API: ${{ secrets.LIVE_API }}
          DETAIL_API: ${{ secrets.DETAIL_API }}

      - name: Commit and push updated playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force add the file
          git add -f akashdth.m3u
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "ℹ️ No changes detected in akashdth.m3u"
            git commit --allow-empty -m "🔄 Trigger workflow update [skip ci]"
          else
            echo "✅ Changes detected, committing..."
            git commit -m "🔄 Auto update IPTV playlist [skip ci]"
          fi
          
          git push

      - name: Verify file
        run: |
          if [ -f "akashdth.m3u" ]; then
            echo "✅ akashdth.m3u created successfully"
            echo "📄 File size: $(wc -c < akashdth.m3u) bytes"
            echo "📄 Lines: $(wc -l < akashdth.m3u)"
          else
            echo "❌ akashdth.m3u NOT found!"
            exit 1
          fi
