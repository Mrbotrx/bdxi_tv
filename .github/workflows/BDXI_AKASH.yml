name: BDXI AKASH by Kbbot

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install aiohttp

      - name: Run IPTV Script
        run: |
          python Bdotttv.py

      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add akashdth.m3u

          git diff --staged --quiet || git commit -m "BDXI AKASH auto update"

          git push
